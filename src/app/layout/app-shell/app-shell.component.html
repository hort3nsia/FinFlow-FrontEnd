<div class="shell">
  <aside class="shell__sidebar">
    <div class="shell__sidebar-pane">
      <a class="shell__brand" routerLink="/app/dashboard" aria-label="Open FinFlow dashboard">
        <app-brand-mark />
      </a>

      <div class="shell__workspace-copy">
        <h1>FinFlow Systems</h1>
        <p>Finance Workspace</p>
      </div>

      <nav class="shell__nav" aria-label="Workspace navigation">
        @for (item of navItems; track item.label) {
          @if (item.route) {
            <a
              class="shell__nav-link"
              [routerLink]="item.route"
              routerLinkActive="shell__nav-link--active"
              [routerLinkActiveOptions]="{ exact: true }"
            >
              <span class="shell__nav-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  @switch (item.icon) {
                    @case ('overview') {
                      <rect x="3" y="3" width="7" height="7"></rect>
                      <rect x="14" y="3" width="7" height="7"></rect>
                      <rect x="14" y="14" width="7" height="7"></rect>
                      <rect x="3" y="14" width="7" height="7"></rect>
                    }
                    @case ('documents') {
                      <path d="M7 3h7l5 5v13a1 1 0 0 1-1 1H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"></path>
                      <path d="M14 3v6h6"></path>
                      <path d="M9 13h6"></path>
                      <path d="M9 17h6"></path>
                    }
                    @case ('approvals') {
                      <rect x="4" y="3" width="16" height="18" rx="2"></rect>
                      <path d="M8 7h8"></path>
                      <path d="M8 11h4"></path>
                      <path d="m8 16 2 2 5-5"></path>
                    }
                    @case ('expenses') {
                      <rect x="3" y="6" width="18" height="12" rx="2"></rect>
                      <path d="M3 10h18"></path>
                      <circle cx="8" cy="14" r="1"></circle>
                    }
                    @case ('budgets') {
                      <path d="M12 1v22"></path>
                      <path d="M17 5H9a3 3 0 0 0 0 6h6a3 3 0 1 1 0 6H6"></path>
                    }
                    @case ('vendors') {
                      <path d="M3 7 12 3l9 4"></path>
                      <path d="M4 10h16"></path>
                      <path d="M6 10v8"></path>
                      <path d="M10 10v8"></path>
                      <path d="M14 10v8"></path>
                      <path d="M18 10v8"></path>
                      <path d="M3 21h18"></path>
                    }
                    @case ('assistant') {
                      <rect x="7" y="7" width="10" height="9" rx="2"></rect>
                      <path d="M9 11h.01"></path>
                      <path d="M15 11h.01"></path>
                      <path d="M9.5 15c.7.6 1.5.9 2.5.9s1.8-.3 2.5-.9"></path>
                      <path d="M12 2v3"></path>
                      <path d="M8 4 6 6"></path>
                      <path d="M16 4 18 6"></path>
                    }
                    @case ('audit') {
                      <path d="M4 6h16"></path>
                      <path d="M4 12h10"></path>
                      <path d="M4 18h7"></path>
                      <path d="m16 15 2 2 4-4"></path>
                    }
                    @default {
                      <circle cx="12" cy="12" r="3"></circle>
                      <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 0 1 0 2.8 2 2 0 0 1-2.8 0l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.2a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.2a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h.1a1.7 1.7 0 0 0 1-1.5V3a2 2 0 0 1 4 0v.2a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 0 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v.1a1.7 1.7 0 0 0 1.5 1H21a2 2 0 0 1 0 4h-.2a1.7 1.7 0 0 0-1.4 1z"></path>
                    }
                  }
                </svg>
              </span>
              <span>{{ item.label }}</span>
            </a>
          } @else {
            <button type="button" class="shell__nav-link" disabled>
              <span class="shell__nav-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  @switch (item.icon) {
                    @case ('overview') {
                      <rect x="3" y="3" width="7" height="7"></rect>
                      <rect x="14" y="3" width="7" height="7"></rect>
                      <rect x="14" y="14" width="7" height="7"></rect>
                      <rect x="3" y="14" width="7" height="7"></rect>
                    }
                    @case ('documents') {
                      <path d="M7 3h7l5 5v13a1 1 0 0 1-1 1H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"></path>
                      <path d="M14 3v6h6"></path>
                      <path d="M9 13h6"></path>
                      <path d="M9 17h6"></path>
                    }
                    @case ('approvals') {
                      <rect x="4" y="3" width="16" height="18" rx="2"></rect>
                      <path d="M8 7h8"></path>
                      <path d="M8 11h4"></path>
                      <path d="m8 16 2 2 5-5"></path>
                    }
                    @case ('expenses') {
                      <rect x="3" y="6" width="18" height="12" rx="2"></rect>
                      <path d="M3 10h18"></path>
                      <circle cx="8" cy="14" r="1"></circle>
                    }
                    @case ('budgets') {
                      <path d="M12 1v22"></path>
                      <path d="M17 5H9a3 3 0 0 0 0 6h6a3 3 0 1 1 0 6H6"></path>
                    }
                    @case ('vendors') {
                      <path d="M3 7 12 3l9 4"></path>
                      <path d="M4 10h16"></path>
                      <path d="M6 10v8"></path>
                      <path d="M10 10v8"></path>
                      <path d="M14 10v8"></path>
                      <path d="M18 10v8"></path>
                      <path d="M3 21h18"></path>
                    }
                    @case ('assistant') {
                      <rect x="7" y="7" width="10" height="9" rx="2"></rect>
                      <path d="M9 11h.01"></path>
                      <path d="M15 11h.01"></path>
                      <path d="M9.5 15c.7.6 1.5.9 2.5.9s1.8-.3 2.5-.9"></path>
                      <path d="M12 2v3"></path>
                      <path d="M8 4 6 6"></path>
                      <path d="M16 4 18 6"></path>
                    }
                    @case ('audit') {
                      <path d="M4 6h16"></path>
                      <path d="M4 12h10"></path>
                      <path d="M4 18h7"></path>
                      <path d="m16 15 2 2 4-4"></path>
                    }
                    @default {
                      <circle cx="12" cy="12" r="3"></circle>
                      <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 0 1 0 2.8 2 2 0 0 1-2.8 0l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.2a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.2a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h.1a1.7 1.7 0 0 0 1-1.5V3a2 2 0 0 1 4 0v.2a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 0 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v.1a1.7 1.7 0 0 0 1.5 1H21a2 2 0 0 1 0 4h-.2a1.7 1.7 0 0 0-1.4 1z"></path>
                    }
                  }
                </svg>
              </span>
              <span>{{ item.label }}</span>
            </button>
          }
        }
      </nav>
    </div>
  </aside>

  <div class="shell__main shell__main-frame">
    <header class="shell__topbar">
      <div class="shell__topbar-inner">
        <div class="shell__search" aria-label="Search workspace">
          <span class="shell__search-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="7"></circle>
              <path d="m20 20-3.5-3.5"></path>
            </svg>
          </span>
          <span>Search workspace...</span>
        </div>

        <div class="shell__actions">
          <button type="button" class="shell__icon-button" aria-label="Notifications">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V11a6 6 0 0 0-4-5.65V4a2 2 0 1 0-4 0v1.35A6 6 0 0 0 6 11v3.2a2 2 0 0 1-.6 1.4L4 17h5"></path>
              <path d="M9 17a3 3 0 0 0 6 0"></path>
            </svg>
          </button>
          <button type="button" class="shell__icon-button" aria-label="Help">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="9"></circle>
              <path d="M9.1 9a3 3 0 1 1 5.8 1c0 2-3 2-3 4"></path>
              <path d="M12 17h.01"></path>
            </svg>
          </button>

          <div class="shell__account-menu">
            <button
              type="button"
              class="shell__account-trigger"
              [attr.aria-expanded]="isAccountMenuOpen()"
              aria-haspopup="menu"
              (click)="toggleAccountMenu()"
            >
              <span class="shell__account-avatar" aria-hidden="true">
                {{ (userEmail() || 'U').charAt(0).toUpperCase() }}
              </span>

              <span class="shell__account-copy">
                <span class="shell__label">Signed in as</span>
                <strong>{{ userEmail() || 'demo@finflow.local' }}</strong>
              </span>
            </button>

            @if (isAccountMenuOpen()) {
              <div class="shell__account-dropdown" role="menu">
                <button
                  type="button"
                  class="shell__account-item shell__account-item--danger"
                  role="menuitem"
                  (click)="logout()"
                >
                  Đăng xuất
                </button>
              </div>
            }
          </div>
        </div>
      </div>
    </header>

    <main class="shell__content">
      <div class="shell__content-shell">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
