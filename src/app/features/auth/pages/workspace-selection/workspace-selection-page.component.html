<div class="min-h-screen bg-slate-50">
  <!-- Topbar -->
  <header class="sticky top-0 z-40 border-b border-gray-200 bg-white">
    <div class="mx-auto flex h-14 max-w-6xl items-center justify-between px-6">
      <div class="flex items-center gap-2">
        <span class="inline-flex h-[18px] w-[18px] items-center justify-center rounded-md bg-blue-600 text-white">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" class="h-[10px] w-[10px]">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="14 2 14 8 20 8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="text-[15px] font-bold tracking-tight text-slate-900">FinFlow</span>
      </div>
      <div class="relative">
        <button type="button" (click)="toggleAccountMenu()"
          class="inline-flex items-center gap-2 rounded-lg px-2 py-1.5 text-[13px] text-slate-600 hover:bg-gray-50">
          <span>{{ userEmail() }}</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-3.5 w-3.5 text-slate-400"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        @if (isAccountMenuOpen()) {
          <div class="absolute right-0 mt-1 w-44 overflow-hidden rounded-lg border border-gray-200 bg-white shadow-lg">
            <button type="button" (click)="logout()" class="flex w-full items-center gap-2 px-3 py-2 text-left text-[13px] text-slate-700 hover:bg-gray-50">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-3.5 w-3.5 text-slate-400"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              Đăng xuất
            </button>
          </div>
        }
      </div>
    </div>
  </header>

  <!-- Body -->
  <main class="px-4 pb-16">
    <div class="mx-auto max-w-3xl pt-12">
      <header class="mb-8">
        <h1 class="text-[28px] font-bold leading-tight tracking-tight text-slate-900">Chọn workspace</h1>
        <p class="mt-2 max-w-xl text-[15px] text-slate-500">
          Bạn đang là thành viên của các workspace dưới đây. Chọn workspace để vào hoặc tạo mới.
        </p>
      </header>

      @if (errorMessage()) {
        <div class="mb-6 flex items-start gap-2 rounded-r-lg border-l-4 border-red-500 bg-red-50 px-4 py-3" role="alert">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mt-0.5 h-4 w-4 shrink-0 text-red-500"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          <div class="text-[13px] text-red-700">
            {{ errorMessage() }}
            <button type="button" (click)="retryLoadWorkspaces()" class="ml-2 font-semibold underline">Thử lại</button>
          </div>
        </div>
      }

      @if (isLoading()) {
        <div class="grid grid-cols-1 gap-3 md:grid-cols-2">
          <div class="h-[88px] animate-pulse rounded-xl bg-gray-100"></div>
          <div class="h-[88px] animate-pulse rounded-xl bg-gray-100"></div>
          <div class="h-[88px] animate-pulse rounded-xl bg-gray-100"></div>
        </div>
      } @else {
        <div class="grid grid-cols-1 gap-3 md:grid-cols-2">
          @for (w of workspaces(); track w.membershipId) {
            <button type="button"
              class="group flex items-center gap-4 rounded-xl border border-gray-200 bg-white p-4 text-left transition-all hover:border-blue-300 hover:shadow-sm disabled:cursor-not-allowed disabled:opacity-60"
              [disabled]="isSwitching() === w.membershipId"
              (click)="selectWorkspace(w.membershipId)">
              <span class="flex h-11 w-11 shrink-0 items-center justify-center rounded-full bg-blue-600 text-[14px] font-semibold text-white">
                {{ workspaceInitial(w) }}
              </span>
              <div class="min-w-0 flex-1">
                <p class="truncate text-[15px] font-semibold text-slate-900">{{ w.tenantName }}</p>
                <div class="mt-1 flex flex-wrap items-center gap-1.5">
                  <span class="inline-flex items-center rounded-full border border-slate-200 bg-slate-100 px-2 py-0.5 text-[11px] font-medium text-slate-700">
                    {{ w.role }}
                  </span>
                </div>
              </div>
              @if (isSwitching() === w.membershipId) {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="h-4 w-4 animate-spin text-blue-600"><path d="M21 12a9 9 0 1 1-6.2-8.55"/></svg>
              } @else {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4 text-slate-400 transition-colors group-hover:text-blue-600"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
              }
            </button>
          }
        </div>
      }

      <button type="button" (click)="createNewWorkspace()"
        class="mt-4 flex w-full items-center justify-center gap-2 rounded-xl border-2 border-dashed border-gray-300 bg-white px-4 py-4 text-[14px] font-medium text-blue-600 transition-colors hover:border-blue-300 hover:bg-blue-50">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Tạo workspace mới
      </button>
    </div>
  </main>
</div>
