<app-auth-layout>
  <header class="mb-8">
    <h1 class="text-[24px] font-bold leading-tight text-slate-900">Quên mật khẩu?</h1>
    <p class="mt-1 text-[14px] text-slate-500">Nhập email để nhận mã xác thực</p>
  </header>

  @if (errorMessage()) {
    <div class="mb-4 flex items-start gap-2 rounded-r-lg border-l-4 border-red-500 bg-red-50 px-4 py-3" role="alert">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mt-0.5 h-4 w-4 shrink-0 text-red-500"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      <span class="text-[13px] leading-relaxed text-red-700">{{ errorMessage() }}</span>
    </div>
  }

  <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
    <div class="w-full">
      <label for="forgot-email" class="mb-1.5 block text-[13px] font-medium text-slate-700">Email</label>
      <input
        id="forgot-email"
        type="email"
        formControlName="email"
        autocomplete="email"
        placeholder="ten@congty.vn"
        class="h-[42px] w-full rounded-lg border border-gray-300 bg-white px-3 text-[14px] text-slate-900 placeholder:text-slate-400 transition-colors focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-100"
        [class.border-red-400]="form.controls.email.invalid && form.controls.email.touched"
      />
      @if (form.controls.email.invalid && form.controls.email.touched) {
        <p class="mt-1 text-[12px] text-red-600">
          @if (form.controls.email.errors?.['required']) { Vui lòng nhập email. }
          @else { Email không hợp lệ. }
        </p>
      }
    </div>

    <button type="submit"
      class="inline-flex h-11 w-full items-center justify-center gap-2 rounded-lg bg-blue-600 px-4 text-[14px] font-semibold text-white transition-colors hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-200 disabled:cursor-not-allowed disabled:opacity-70"
      [disabled]="isSubmitting()">
      @if (isSubmitting()) {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="h-4 w-4 animate-spin"><path d="M21 12a9 9 0 1 1-6.2-8.55"/></svg>
        <span>Đang gửi...</span>
      } @else { Gửi mã xác thực }
    </button>
  </form>

  <button routerLink="/login" class="mt-6 inline-flex w-full items-center justify-center gap-1.5 text-[13px] text-slate-500 hover:text-slate-700">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-3.5 w-3.5"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Quay lại đăng nhập
  </button>
</app-auth-layout>
