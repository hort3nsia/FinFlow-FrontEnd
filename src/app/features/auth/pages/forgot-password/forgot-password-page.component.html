<div class="flex min-h-screen items-center justify-center bg-slate-50 px-4 py-12">
  <div class="w-full max-w-md rounded-2xl border border-slate-200 bg-white p-8 shadow-xl">
    <a routerLink="/" class="inline-flex items-center gap-2.5">
      <span class="flex h-9 w-9 items-center justify-center rounded-lg bg-gradient-to-br from-indigo-600 to-violet-600 text-white shadow-sm">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">
          <path d="M4.5 9.25 12 5l7.5 4.25L12 13.5 4.5 9.25Z"></path>
          <path d="M4.5 13.1 12 17.35l7.5-4.25"></path>
          <path d="M4.5 16.95 12 21.2l7.5-4.25"></path>
        </svg>
      </span>
      <span class="text-base font-semibold text-slate-900">FinFlow</span>
    </a>

    <h1 class="mt-6 text-2xl font-semibold text-slate-900">Quên mật khẩu?</h1>
    <p class="mt-2 text-sm text-slate-500">
      Nhập email đã đăng ký, chúng tôi sẽ gửi mã xác thực để đặt lại mật khẩu.
    </p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="mt-6 space-y-4">
      <label class="block">
        <span class="mb-1 block text-sm font-medium text-slate-700">Email</span>
        <input
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="ban@congty.vn"
          class="w-full rounded-lg border border-slate-200 bg-white px-3 py-2.5 text-sm focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-100"
        />
        @if (form.controls.email.invalid && form.controls.email.touched) {
          <span class="mt-1 block text-xs text-rose-600">
            @if (form.controls.email.errors?.['required']) { Vui lòng nhập email. }
            @else { Email không hợp lệ. }
          </span>
        }
      </label>

      @if (errorMessage()) {
        <div class="rounded-lg border border-rose-200 bg-rose-50 p-3 text-sm text-rose-700">
          {{ errorMessage() }}
        </div>
      }

      <button
        type="submit"
        class="w-full rounded-lg bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-indigo-700 disabled:cursor-not-allowed disabled:opacity-60"
        [disabled]="isSubmitting()"
      >
        @if (isSubmitting()) { Đang gửi… } @else { Gửi mã xác thực }
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-slate-600">
      Nhớ ra rồi?
      <a routerLink="/login" class="font-medium text-indigo-600 hover:underline">Quay lại đăng nhập</a>
    </p>
  </div>
</div>
