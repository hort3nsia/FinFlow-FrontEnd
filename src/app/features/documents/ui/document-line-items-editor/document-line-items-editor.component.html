<section class="line-items-editor">
  <div class="line-items-editor__header">
    <div>
      <h3>Line items</h3>
      <p>Review or adjust OCR-detected items before submission.</p>
    </div>

    <button type="button" class="line-items-editor__add" [disabled]="disabled()" (click)="addLineItem()">
      Add line item
    </button>
  </div>

  <div class="line-items-editor__rows">
    @for (lineItemGroup of lineItems().controls; track trackByIndex($index)) {
      <fieldset class="line-items-editor__row" [formGroup]="asFormGroup(lineItemGroup)" [disabled]="disabled()">
        <label [class.line-items-editor__field--invalid]="hasError(asFormGroup(lineItemGroup).get('itemName'))">
          <span>Item</span>
          <input type="text" formControlName="itemName" />
          @if (getErrorMessage(asFormGroup(lineItemGroup).get('itemName'), 'name'); as errorMessage) {
            <small class="line-items-editor__error">{{ errorMessage }}</small>
          }
        </label>

        <label [class.line-items-editor__field--invalid]="hasError(asFormGroup(lineItemGroup).get('quantity'))">
          <span>Qty</span>
          <input type="number" formControlName="quantity" min="0.01" step="0.01" />
          @if (getErrorMessage(asFormGroup(lineItemGroup).get('quantity'), 'quantity'); as errorMessage) {
            <small class="line-items-editor__error">{{ errorMessage }}</small>
          }
        </label>

        <label [class.line-items-editor__field--invalid]="hasError(asFormGroup(lineItemGroup).get('unitPrice'))">
          <span>Unit price</span>
          <input type="number" formControlName="unitPrice" min="0" step="0.01" />
          @if (getErrorMessage(asFormGroup(lineItemGroup).get('unitPrice'), 'unit price'); as errorMessage) {
            <small class="line-items-editor__error">{{ errorMessage }}</small>
          }
        </label>

        <label [class.line-items-editor__field--invalid]="hasError(asFormGroup(lineItemGroup).get('total'))">
          <span>Total</span>
          <input type="number" formControlName="total" min="0" step="0.01" />
          @if (getErrorMessage(asFormGroup(lineItemGroup).get('total'), 'total'); as errorMessage) {
            <small class="line-items-editor__error">{{ errorMessage }}</small>
          }
        </label>

        <button
          type="button"
          class="line-items-editor__remove"
          [disabled]="disabled() || lineItems().length <= 1"
          (click)="removeLineItem($index)"
        >
          Remove
        </button>
      </fieldset>
    }
  </div>
</section>
