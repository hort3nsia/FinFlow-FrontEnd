<div class="space-y-4">
  <label
    [for]="inputId()"
    class="block cursor-pointer rounded-[28px] border-2 border-dashed p-6 text-center transition"
    [ngClass]="dragActive() ? 'border-indigo-400 bg-indigo-50/80' : 'border-slate-300 bg-slate-50 hover:border-indigo-300 hover:bg-indigo-50/40'"
    (dragover)="dragOverEvent.emit($event)"
    (dragleave)="dragLeaveEvent.emit($event)"
    (drop)="dropEvent.emit($event)"
  >
    @if (hasImagePreview()) {
      <img [src]="imagePreviewUrl()" alt="Document preview" class="mx-auto max-h-[28rem] w-full rounded-2xl border border-slate-200 bg-white object-contain" />
    } @else if (hasPdfPreview()) {
      <iframe [src]="pdfPreviewUrl()" title="Document preview" class="h-[32rem] w-full rounded-2xl border border-slate-200 bg-white"></iframe>
    } @else {
      <div class="flex min-h-[28rem] flex-col items-center justify-center rounded-2xl border border-slate-200 bg-white px-6">
        <span class="flex h-14 w-14 items-center justify-center rounded-full bg-slate-100 text-slate-400">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" class="h-7 w-7">
            <path d="M12 16V4"></path>
            <path d="m7 9 5-5 5 5"></path>
            <path d="M20 16.5a3.5 3.5 0 0 1-3.5 3.5h-9A3.5 3.5 0 0 1 4 16.5"></path>
          </svg>
        </span>
        <p class="mt-5 text-base font-semibold text-slate-900">{{ title() }}</p>
        <p class="mt-2 max-w-sm text-sm leading-6 text-slate-500">{{ hint() }}</p>
        <span class="mt-5 inline-flex items-center rounded-xl bg-white px-4 py-2 text-sm font-medium text-slate-700 ring-1 ring-slate-200">
          {{ chooseLabel() }}
        </span>
      </div>
    }

    <input
      [id]="inputId()"
      type="file"
      accept="application/pdf,image/*"
      class="sr-only"
      (change)="fileSelected.emit($event)"
    />
  </label>

  <div class="space-y-1">
    @if (fileName()) {
      <p class="truncate text-sm font-medium text-slate-800">{{ fileName() }}</p>
    } @else {
      <p class="text-sm font-medium text-slate-800">{{ previewPlaceholder() }}</p>
    }
    @if (note()) {
      <p class="text-xs leading-5 text-slate-500">{{ note() }}</p>
    }
  </div>
</div>
